services:
  proxycli:
    build:
      context: .
      dockerfile: Dockerfile
    image: proxycli:latest
    container_name: proxycli
    ports:
      - "8488:8488"
    volumes:
      # Persistent database + session files
      - ./data:/app/data
      # Config file (edit on host, writable inside container)
      - ./config.yaml:/app/config.yaml
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8488/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
